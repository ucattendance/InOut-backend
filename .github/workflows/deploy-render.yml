name: Deploy Backend to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-render-backend
  cancel-in-progress: true

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. Add it from Render → Settings → Deploy Hook."
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deploy triggered."

      - name: Wait for API health
        run: |
          for i in $(seq 1 20); do
            if curl -fsS "https://uc-attendance-system-1ts2.onrender.com/ping" | grep -q pong; then
              echo "Backend is up."
              exit 0
            fi
            echo "Waiting for Render... ($i/20)"
            sleep 15
          done
          echo "Backend ping timeout — check Render dashboard."
          exit 1

      - name: Verify Swagger endpoint
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://uc-attendance-system-1ts2.onrender.com/api-docs/")
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "Swagger /api-docs is live ($code)."
              exit 0
            fi
            echo "Waiting for /api-docs... ($i/12) status=$code"
            sleep 15
          done
          echo "Swagger not ready yet — backend may still be building."
          exit 1
